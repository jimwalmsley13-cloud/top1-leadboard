<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guild Battle Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-blue:   #0087FF;
    --brand-grey:   #3D4449;
    --brand-green:  #29E863;
    --brand-orange: #FF7800;
    --brand-red:    #E8293D;
    --bg:           #EBEBEB;
    --text:         #3D4449;
    --font:         'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 32px 24px; }
  .wrap { max-width: 900px; margin: 0 auto; }
  header { margin-bottom: 20px; }
  header h1 { font-size: 20px; font-weight: 700; color: var(--brand-blue); letter-spacing: -0.3px; }
  header p { font-size: 13px; color: #777; margin-top: 4px; }

  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .controls .group { display: flex; align-items: center; gap: 8px; }
  .controls span.label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-right: 2px; }
  .filter-btn {
    font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--brand-grey);
    background: #fff; border: 1px solid #ddd; border-radius: 999px; padding: 6px 16px;
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--brand-blue); color: var(--brand-blue); }
  .filter-btn.active { background: var(--brand-blue); border-color: var(--brand-blue); color: #fff; }
  .filter-btn.active.red-active { background: var(--brand-red); border-color: var(--brand-red); }
  .filter-btn.active.blue-active { background: var(--brand-blue); border-color: var(--brand-blue); }

  .divider { height: 1px; background: #ddd; margin: 16px 0 20px 0; }

  .table-wrap { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,135,255,0.06); margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--brand-blue); color: #fff; }
  thead th { padding: 10px 14px; text-align: left; font-weight: 600; font-size: 11.5px; letter-spacing: 0.4px; text-transform: uppercase; white-space: nowrap; cursor: pointer; user-select: none; }
  thead th.num { text-align: right; }
  thead th:hover { background: #0072d6; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0f7ff; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:nth-child(even):hover { background: #f0f7ff; }
  tbody tr.hidden-row { display: none; }
  td { padding: 8px 14px; color: var(--text); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
  td.player { font-weight: 600; }
  td.rank { text-align: center; color: #aaa; font-size: 12px; font-weight: 500; width: 34px; }
  .team-tag { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
  .team-blue { background: rgba(0,135,255,0.13); color: #0060cc; }
  .team-red  { background: rgba(232,41,61,0.12); color: #c21f31; }

  .chart-card { background: #fff; border-radius: 12px; padding: 20px 22px 22px 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,135,255,0.06); }
  .chart-card h2 { font-size: 14px; font-weight: 700; color: var(--brand-grey); margin-bottom: 3px; }
  .chart-card p.sub { font-size: 12px; color: #999; margin-bottom: 16px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-name { width: 130px; font-size: 12px; font-weight: 600; color: var(--brand-grey); text-align: right; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; background: #f2f2f2; border-radius: 6px; height: 18px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.3s ease; }
  .bar-fill.blue { background: linear-gradient(90deg, #0087FF, #4dabff); }
  .bar-fill.red  { background: linear-gradient(90deg, #E8293D, #f2626f); }
  .bar-value { width: 56px; font-size: 12px; font-weight: 600; color: var(--brand-grey); text-align: left; flex-shrink: 0; }

  .stat-pill { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12.5px; font-weight: 600; min-width: 44px; text-align: center; }
  .stat-above { background: rgba(41,232,99,0.15); color: #1a9c47; }
  .stat-below { background: rgba(232,41,61,0.13); color: #c21f31; }

  .legend-row { max-width: 900px; margin: -4px 0 16px 0; display: flex; gap: 18px; font-size: 12px; color: #777; }
  .legend-row span { display: inline-flex; align-items: center; gap: 6px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .legend-dot.green { background: #29E863; }
  .legend-dot.red { background: #E8293D; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Guild Battle Stats</h1>
    <p>ฮีล / รับดาเมท / ตาย / ชุบ ต่อผู้เล่น แยกตามวันและแมตช์</p>
  </header>

  <div class="controls">
    <div class="group">
      <span class="label">Day:</span>
      <button class="filter-btn active" data-day="1">Day 1</button>
      <button class="filter-btn" data-day="2">Day 2</button>
      <button class="filter-btn" data-day="3">Day 3</button>
      <button class="filter-btn" data-day="all">All Days (avg)</button>
    </div>
  </div>
  <div class="controls" id="matchControlGroup">
    <div class="group">
      <span class="label">Match:</span>
      <div id="matchButtons"></div>
    </div>
  </div>
  <div class="controls">
    <div class="group">
      <span class="label">Team:</span>
      <button class="filter-btn active" data-team="all">All</button>
      <button class="filter-btn" data-team="blue">Blue</button>
      <button class="filter-btn" data-team="Red">Red</button>
    </div>
    <div class="group" id="pageControlGroup">
      <span class="label">Page:</span>
      <button class="filter-btn active" data-page="all">All</button>
      <button class="filter-btn" data-page="1">หน้า 1</button>
      <button class="filter-btn" data-page="2">หน้า 2</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="legend-row">
    <span><span class="legend-dot green"></span> Above average (below avg for ตาย)</span>
    <span><span class="legend-dot red"></span> Below average (above avg for ตาย)</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>ชื่อ</th>
          <th class="num" data-sort="heal" id="thHeal">ฮีล</th>
          <th class="num" data-sort="dmg" id="thDmg">รับดาเมท</th>
          <th class="num" data-sort="deaths" id="thDeaths">ตาย</th>
          <th class="num" data-sort="assist" id="thAssist">ชุบ</th>
          <th>ทีม</th>
          <th class="num" id="thLast">หน้า</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="chart-card">
    <h2 id="chartTitle">ฮีล (Heal) by Player</h2>
    <p class="sub" id="chartSub">Match 1 · All teams · sorted highest to lowest</p>
    <div id="chart"></div>
  </div>
</div>

      ["ช่างกวน เย่วหลัง", 1716, 2554, 16, 18, "Red", 2],
      ["Zenn'", 1703, 2362, 10, 20, "Red", 2],
      ["Saierxo'", 1673, 1295, 4, 17, "Red", 2],
      ["Lunive_", 1261, 1037, 8, 18, "Red", 2],
      ["jasmalyns", 1615, 1600, 9, 18, "Red", 2]
    ]
  };

  let state = { day: 1, match: 1, team: "all", page: "all", sortKey: null, sortDir: 1 };

  const tbody = document.getElementById('tableBody');
  const chartEl = document.getElementById('chart');
  const chartSub = document.getElementById('chartSub');

  // Known spelling / nickname variants across days that refer to the same player.
  // Key = variant spelling as it appears in the raw data, Value = canonical name to group under.
  const NAME_ALIASES = {
    "Rosmaryn": "Rozmaryn",
    "alias_s/ปังแยม": "alias_s",
    "Babata": "babata",
    "Cerâ": "Cera",
    "Fade": "FADE",
    "Linh Kieuu": "Linh Kiều",
    "Linh Mi Co'": "Linh Mi Co",
    "Luminous Liz": "Luminous",
    "Luna'": "Luna",
    "Maëlys": "Maelys",
    "MyMiiNz": "MyMiin",
    "Nomwhan/BX": "Nomwhan'",
    "Saierxo'": "Saierxo",
    "WeiXiaoyang": "Weixiao",
    "xBIEBIE": "xBiebie",
    "xinxin 愛": "XinXin",
    "กริ๊กๆ": "กร็กๆ",
    "KAGIRA/จิ้เหนี่ยว": "จิ้เหนี่ยว",
    "เจ้ามุกถูกดุย": "เจ้ามุก",
    "ปังเนย'": "ปังเนย",
    "ปังแยม'": "ปังแยม",
    "ปังชูส์": "ปังชูริม",
    "ลวกเดี่ยวอยู่": "ลวกเดี่ยว",
    "อาเฟยเหนี่ยวหมู": "อาเฟย",
    "JeleSoBad": "Jele"
  };
  function canonicalName(name) {
    return NAME_ALIASES[name] || name;
  }

  function getAllDaysAggregate() {
    const map = {};
    Object.keys(days).forEach(dayNum => {
      Object.keys(days[dayNum]).forEach(matchNum => {
        days[dayNum][matchNum].forEach(r => {
          const [rawName, heal, dmg, deaths, assist, team] = r;
          const name = canonicalName(rawName);
          if (!map[name]) map[name] = { name, heals: [], dmgs: [], deaths: [], assists: [], teamCounts: {} };
          const p = map[name];
          p.heals.push(heal);
          p.dmgs.push(dmg);
          p.deaths.push(deaths);
          p.assists.push(assist);
          p.teamCounts[team] = (p.teamCounts[team] || 0) + 1;
        });
      });
    });
    const avg = arr => arr.reduce((s, v) => s + v, 0) / arr.length;
    return Object.values(map).map(p => {
      const team = Object.entries(p.teamCounts).sort((a, b) => b[1] - a[1])[0][0];
      return {
        name: p.name,
        heal: Math.round(avg(p.heals)),
        dmg: Math.round(avg(p.dmgs)),
        deaths: Math.round(avg(p.deaths) * 10) / 10,
        assist: Math.round(avg(p.assists) * 10) / 10,
        team: team,
        page: p.heals.length // repurposed as "matches played"
      };
    });
  }

  function getFilteredRows() {
    let rows;
    if (state.day === 'all') {
      rows = getAllDaysAggregate();
    } else {
      rows = days[state.day][state.match].map(r => ({
        name: r[0], heal: r[1], dmg: r[2], deaths: r[3], assist: r[4], team: r[5], page: r[6]
      }));
    }
    if (state.team !== "all") rows = rows.filter(r => r.team === state.team);
    if (state.day !== 'all' && state.page !== "all") rows = rows.filter(r => String(r.page) === String(state.page));
    if (state.sortKey) {
      rows.sort((a, b) => (a[state.sortKey] - b[state.sortKey]) * state.sortDir);
    }
    return rows;
  }

  function render() {
    const rows = getFilteredRows();
    const isAll = state.day === 'all';

    // Update header labels for avg mode
    document.getElementById('thLast').textContent = isAll ? 'แมตช์' : 'หน้า';
    document.getElementById('chartTitle').textContent = isAll ? 'ฮีล (Average) by Player — All Days' : 'ฮีล (Heal) by Player';

    // Column averages for the currently visible rows (higher-is-better stats)
    const avg = arr => arr.reduce((s, v) => s + v, 0) / arr.length;
    const avgHeal   = rows.length ? avg(rows.map(r => r.heal))   : 0;
    const avgDmg    = rows.length ? avg(rows.map(r => r.dmg))    : 0;
    const avgDeaths = rows.length ? avg(rows.map(r => r.deaths)) : 0;
    const avgAssist = rows.length ? avg(rows.map(r => r.assist)) : 0;

    // higherIsBetter=true -> above avg is green; false (ตาย) -> below avg is green
    function pill(value, average, higherIsBetter) {
      const isGood = higherIsBetter ? value >= average : value <= average;
      const cls = isGood ? 'stat-above' : 'stat-below';
      return `<span class="stat-pill ${cls}">${value.toLocaleString()}</span>`;
    }

    // Table
    tbody.innerHTML = "";
    rows.forEach((r, i) => {
      const tr = document.createElement('tr');
      const tagClass = r.team === "blue" ? "team-blue" : "team-red";
      tr.innerHTML = `
        <td class="rank">${i + 1}</td>
        <td class="player">${r.name}</td>
        <td class="num">${pill(r.heal, avgHeal, true)}</td>
        <td class="num">${pill(r.dmg, avgDmg, true)}</td>
        <td class="num">${pill(r.deaths, avgDeaths, false)}</td>
        <td class="num">${pill(r.assist, avgAssist, true)}</td>
        <td><span class="team-tag ${tagClass}">${r.team}</span></td>
        <td class="num">${r.page}</td>
      `;
      tbody.appendChild(tr);
    });

    // Chart: heal by player, sorted desc, for currently filtered rows
    const chartRows = [...rows].sort((a, b) => b.heal - a.heal);
    const maxHeal = Math.max(...chartRows.map(r => r.heal), 1);
    chartEl.innerHTML = "";
    chartRows.forEach(r => {
      const pct = (r.heal / maxHeal) * 100;
      const colorClass = r.team === "blue" ? "blue" : "red";
      const row = document.createElement('div');
      row.className = "bar-row";
      row.innerHTML = `
        <div class="bar-name" title="${r.name}">${r.name}</div>
        <div class="bar-track"><div class="bar-fill ${colorClass}" style="width:${pct}%"></div></div>
        <div class="bar-value">${r.heal.toLocaleString()}</div>
      `;
      chartEl.appendChild(row);
    });

    const teamLabel = state.team === "all" ? "All teams" : state.team;
    if (isAll) {
      chartSub.textContent = `All Days combined · ${teamLabel} · average per player across every match played · sorted highest to lowest`;
    } else {
      const pageLabel = state.page === "all" ? "All pages" : "หน้า " + state.page;
      chartSub.textContent = `Day ${state.day} · Match ${state.match} · ${teamLabel} · ${pageLabel} · sorted highest to lowest`;
    }
  }

  function renderMatchButtons() {
    const container = document.getElementById('matchButtons');
    container.innerHTML = "";
    const matchNumbers = Object.keys(days[state.day]).map(Number).sort((a,b) => a - b);
    matchNumbers.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (m === state.match ? ' active' : '');
      btn.textContent = 'Match ' + m;
      btn.dataset.match = m;
      btn.addEventListener('click', () => {
        state.match = m;
        renderMatchButtons();
        render();
      });
      container.appendChild(btn);
    });
  }

  // Day filter
  const matchControlGroup = document.getElementById('matchControlGroup');
  const pageControlGroup = document.getElementById('pageControlGroup');
  document.querySelectorAll('[data-day]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-day]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const dayVal = btn.dataset.day;
      state.day = dayVal === 'all' ? 'all' : Number(dayVal);
      if (state.day === 'all') {
        matchControlGroup.style.display = 'none';
        pageControlGroup.style.display = 'none';
        state.page = 'all';
      } else {
        matchControlGroup.style.display = '';
        pageControlGroup.style.display = '';
        const matchNumbers = Object.keys(days[state.day]).map(Number).sort((a,b) => a - b);
        state.match = matchNumbers[0];
        renderMatchButtons();
      }
      render();
    });
  });

  // Team filter
  document.querySelectorAll('[data-team]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-team]').forEach(b => b.classList.remove('active', 'blue-active', 'red-active'));
      btn.classList.add('active');
      if (btn.dataset.team === 'blue') btn.classList.add('blue-active');
      if (btn.dataset.team === 'Red') btn.classList.add('red-active');
      state.team = btn.dataset.team;
      render();
    });
  });

  // Page filter
  document.querySelectorAll('[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-page]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.page = btn.dataset.page;
      render();
    });
  });

  // Column sort
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (state.sortKey === key) {
        state.sortDir *= -1;
      } else {
        state.sortKey = key;
        state.sortDir = -1;
      }
      render();
    });
  });

  renderMatchButtons();
  render();
</script>
